name: Deploy Apps-Backend

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: "Deploy type"
        required: true
        type: choice
        options:
          - staging
          - rc
          - production

jobs:
  resolve-deploy-type:
    runs-on: ubuntu-latest
    outputs:
      deploy_type: ${{ steps.resolve.outputs.deploy_type }}
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Resolve deploy type
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            DEPLOY_TYPE="staging"
          else
            DEPLOY_TYPE="${{ inputs.deploy_type }}"
          fi

          if [ "$DEPLOY_TYPE" = "staging" ] || [ "$DEPLOY_TYPE" = "rc" ]; then
            ENVIRONMENT="pre-production - apps-backend"
          else
            ENVIRONMENT="production - apps-backend"
          fi

          echo "deploy_type=$DEPLOY_TYPE" >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: resolve-deploy-type
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-deploy-type.outputs.environment }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get the short commit hash
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "VERSION=$COMMIT_HASH" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/apps-backend/Dockerfile
          push: true
          tags: ghcr.io/iotaledger/iota/apps-backend-${{ needs.resolve-deploy-type.outputs.deploy_type }}:${{ env.VERSION }}

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.UPDATER_SSH_PRIVATE_KEY }}

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no updater@${{ secrets.UPDATER_SSH_HOST }} "${{ needs.resolve-deploy-type.outputs.deploy_type }} ${{ env.VERSION }}"
