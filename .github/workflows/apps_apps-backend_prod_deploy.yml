name: Production Deploy for Apps-Backend

on:
  workflow_dispatch:
    inputs:
      deployment:
        type: boolean
        description: "Deploy after build?"
        required: false
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: "Production – apps-backend"

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get the short commit hash
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "VERSION=$COMMIT_HASH" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/apps-backend/Dockerfile
          push: true
          tags: ghcr.io/iotaledger/iota/apps-backend:${{ env.VERSION }}

      - name: Add SSH key
        if: ${{ github.event.inputs.deployment == 'true' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.UPDATER_SSH_PRIVATE_KEY }}

      - name: Deploy to Server
        if: ${{ github.event.inputs.deployment == 'true' }}
        run: |
          ssh -o StrictHostKeyChecking=no updater@${{ secrets.UPDATER_SSH_HOST }} "prod ${{ env.VERSION }}"
