name: Nightly checks

on:
  schedule:
    - cron: "0 22 * * *" # daily at 10:00 PM (UTC)
  workflow_dispatch:
    inputs:
      iota_ref:
        description: "Branch / commit to simtest"
        type: string
        required: true
        default: develop
      test_num:
        description: "MSIM_TEST_NUM (test iterations)"
        type: string
        required: false
        default: "2"
      test_seed:
        description: "MSIM_TEST_SEED (test seed)"
        type: string
        required: false
        default: ""
      test_filter:
        description: "Optional test filter"
        type: string
        required: false
        default: ""
      rustTestsOnly:
        description: "Run only Rust tests"
        type: boolean
        required: false
        default: false
      simTestsOnly:
        description: "Run only simulation tests"
        type: boolean
        required: false
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: "error"
  # Don't emit giant backtraces in the CI logs.
  RUST_BACKTRACE: short
  # Disable incremental compilation.
  #
  # Incremental compilation is useful as part of an edit-build-test-edit cycle,
  # as it lets the compiler avoid recompiling code that hasn't changed. However,
  # on CI, we're not making small edits; we're almost always building the entire
  # project from scratch. Thus, incremental compilation on CI actually
  # introduces *additional* overhead to support making future builds
  # faster...but no future builds will ever occur in any given CI environment.
  #
  # See https://matklad.github.io/2021/09/04/fast-rust-builds.html#ci-workflow
  # for details.
  CARGO_INCREMENTAL: 0
  # Allow more retries for network requests in cargo (downloading crates) and
  # rustup (installing toolchains). This should help to reduce flaky CI failures
  # from transient network timeouts or other issues.
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  IOTA_REF: "${{ github.event.inputs.iota_ref || 'develop' }}"
  TEST_NUM: "${{ github.event.inputs.test_num || '2' }}"
  MSIM_TEST_SEED: "${{ github.event.inputs.test_seed || '' }}"
  TEST_FILTER: "${{ github.event.inputs.test_filter || '' }}"

jobs:
  examples:
    if: ${{ !inputs.rustTestsOnly && !inputs.simTestsOnly }}
    uses: ./.github/workflows/_rust_examples.yml
    with:
      isNightly: true

  tests:
    if: ${{ inputs.rustTestsOnly || !inputs.simTestsOnly }}
    uses: ./.github/workflows/_rust_tests.yml
    with:
      isRust: true
      isPgIntegration: true
      isMoveExampleUsedByOthers: true
      # simtest job below runs a superset of these tests
      runSimtest: false
      # run all tests by default
      testOnlyChangedCrates: false
      isNightly: true

  tests-with-starfish:
    if: ${{ inputs.rustTestsOnly || !inputs.simTestsOnly }}
    uses: ./.github/workflows/_rust_tests.yml
    with:
      isRust: true
      isPgIntegration: true
      isMoveExampleUsedByOthers: true
      consensusProtocol: "starfish"
      # simtest job below runs a superset of these tests
      runSimtest: false
      # run all tests by default
      testOnlyChangedCrates: false
      isNightly: true

  deny:
    if: ${{ !inputs.rustTestsOnly && !inputs.simTestsOnly }}
    uses: ./.github/workflows/_cargo_deny.yml

  deny-external:
    if: ${{ !inputs.rustTestsOnly && !inputs.simTestsOnly }}
    uses: ./.github/workflows/_cargo_deny.yml
    with:
      manifest-path: external-crates/move/Cargo.toml

  execution-cut:
    if: ${{ !inputs.rustTestsOnly && !inputs.simTestsOnly }}
    uses: ./.github/workflows/_execution_cut.yml
    with:
      isNightly: true

  split-cluster:
    if: ${{ !inputs.rustTestsOnly && !inputs.simTestsOnly }}
    uses: ./.github/workflows/_split_cluster.yml

  split-cluster-sync-check:
    if: ${{ !inputs.rustTestsOnly && !inputs.simTestsOnly }}
    uses: ./.github/workflows/_split_cluster_sync_check.yml

  simtest:
    if: ${{ inputs.simTestsOnly || !inputs.rustTestsOnly }}
    timeout-minutes: 600
    runs-on: [self-hosted-x64]
    env:
      CONSENSUS_PROTOCOL: mysticeti

    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          ref: ${{ env.IOTA_REF }}

      - name: Get latest simtest script from commit that triggered this workflow
        run: |
          git fetch origin ${{ github.sha }}
          git checkout ${{ github.sha }} -- scripts/simtest/simtest-run.sh

      - name: Run simtest
        run: scripts/simtest/simtest-run.sh

  simtest-with-starfish:
    if: ${{ inputs.simTestsOnly || !inputs.rustTestsOnly }}
    timeout-minutes: 600
    runs-on: [self-hosted-x64]
    env:
      CONSENSUS_PROTOCOL: starfish

    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          ref: ${{ env.IOTA_REF }}

      - name: Get latest simtest script from commit that triggered this workflow
        run: |
          git fetch origin ${{ github.sha }}
          git checkout ${{ github.sha }} -- scripts/simtest/simtest-run.sh

      - name: Run simtest
        run: scripts/simtest/simtest-run.sh
