name: Detect Changes in Turbo Workspace
description: Defines variables indicating the parts of the turbo workspace have changed
outputs:
  packages:
    description: A list of packages that have changed.
    value: ${{ steps.changes.outputs.packages }}
runs:
  using: composite
  steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      with:
        fetch-depth: 0
    - name: Fetch base branch
      shell: bash
      run: git fetch origin ${{ github.base_ref || 'develop' }}
    - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: "24"
    - id: changes
      name: Detect changes
      shell: bash
      run: echo "packages=$(pnpm --silent dlx turbo@2 run build --filter="...[origin/${{ github.base_ref || 'develop' }}]" --dry=json | jq -c ".packages")" >> $GITHUB_OUTPUT
    - name: Print changes for easy debugging
      shell: bash
      run: echo ${{ steps.changes.outputs.packages }}
