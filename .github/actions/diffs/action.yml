name: Detect Changes
description: Defines variables indicating the parts of the code that changed
outputs:
  isDoc:
    description: True when changes happened to some documentation
    value: "${{ steps.diff.outputs.isDoc }}"
  isRust:
    description: True when changes happened to the Rust code
    value: "${{ steps.diff.outputs.isRust }}"
  isRustWorkspaceConfig:
    description: True when changes happened to workspace-level Rust configuration files that affect all tests
    value: "${{ steps.diff.outputs.isRustWorkspaceConfig }}"
  isRustExample:
    description: True when changes happened to the Rust example code
    value: "${{ steps.diff.outputs.isRustExample }}"
  isRpc:
    description: True when changes happened to the RPC code
    value: "${{ steps.diff.outputs.isRpc }}"
  isPgIntegration:
    description: True when changes happened to the PG integration code
    value: "${{ steps.diff.outputs.isPgIntegration }}"
  isMoveExampleUsedByOthers:
    description: True when changes happened to the Move examples that are used by other tests
    value: "${{ steps.diff.outputs.isMoveExampleUsedByOthers }}"
  isExternalCrates:
    description: True when changes happened in external crates
    value: "${{ steps.diff.outputs.isExternalCrates }}"
  isReleaseNotesEligible:
    description: True when changes happened in Release Notes eligible paths
    value: "${{ steps.diff.outputs.isReleaseNotesEligible }}"
  isTypeScriptCodegenSync:
    description: True when changes happened that affect TypeScript codegen synchronization
    value: "${{ steps.diff.outputs.isTypeScriptCodegenSync }}"
  isStarfishSynchronization:
    description: True when changes happened to synchronization components (commit syncer, header synchronizer, transaction synchronizer)
    value: "${{ steps.diff.outputs.isStarfishSynchronization }}"

runs:
  using: composite
  steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
    - name: Detect Changes
      uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
      id: diff
      with:
        filters: |
          isRust:
            - "consensus/**"
            - "crates/**"
            - "external-crates/**"
            - "iota-execution/**"
            - ".github/workflows/hierarchy.yml"
            - ".github/workflows/codecov.yml"
            - ".github/workflows/_rust.yml"
            - ".github/workflows/_rust_tests.yml"
            - ".github/workflows/_rust_lints.yml"
            - ".github/workflows/_cargo_deny.yml"
            - ".github/workflows/_split_cluster.yml"
            - "scripts/cargo_sort/cargo_sort.py"
            - "scripts/ci_tests/rust_tests.sh"
            - "scripts/ci_tests/rust_tests.py"
            - "Cargo.toml"
            - "Cargo.lock"
            - "rust-toolchain.toml"
            - ".config/nextest.toml"
          isRustWorkspaceConfig:
            - "Cargo.toml"
            - "Cargo.lock"
            - "rust-toolchain.toml"
          isRustExample:
            - "examples/custom-indexer/rust/**"
            - "examples/tic-tac-toe/cli/**"
            - "docs/examples/rust/**"
            - "rust-toolchain.toml"
          isRpc:
            - "crates/iota-graphql-rpc/**"
            - "crates/iota-json-rpc/**"
            - "crates/iota-json-rpc-api/**"
            - "crates/iota-json-rpc-types/**"
            - "rust-toolchain.toml"
          isPgIntegration:
            - "crates/iota-framework/**"
            - "crates/iota-graphql-rpc/**"
            - "crates/iota-graphql-e2e-tests/**"
            - "crates/iota-indexer/**"
            - "crates/iota-json-rpc-api/**"
            - "crates/iota-json-rpc-types/**"
            - ".github/workflows/hierarchy.yml"
            - ".github/workflows/_rust.yml"
            - ".github/workflows/_rust_tests.yml"
            - "Cargo.toml"
            - "Cargo.lock"
            - "rust-toolchain.toml"
            - ".config/nextest.toml"
          isDoc:
            - "docs/content/**"
            - "docs/site/**"
            - ".github/workflows/_docs_lint.yml"
            - ".github/workflows/_docusaurus.yml"
          isMoveExampleUsedByOthers:
            - "examples/move/basics/**"
            - "examples/move/coin/**"
            - "examples/move/nft/**"
            - ".github/workflows/hierarchy.yml"
            - ".github/workflows/_rust.yml"
            - ".github/workflows/_rust_tests.yml"
            - "Cargo.toml"
            - "Cargo.lock"
            - "rust-toolchain.toml"
          isExternalCrates:
            - "external-crates/move/crates/**"
            - "rust-toolchain.toml"
          isReleaseNotesEligible:
            - "consensus/**"
            - "crates/**"
            - "dashboards/**"
            - "doc/**"
            - "docker/**"
            - "dev-tools/**"
            - "setups/**"
            - "external-crates/**"
            - "kiosk/**"
            - "iota-execution/**"
          isTypeScriptCodegenSync:
            # Generated schema files from Rust (inputs to TypeScript codegen)
            - "crates/iota-graphql-rpc/schema.graphql"
            - "crates/iota-open-rpc/spec/openrpc.json"
            # Generated TypeScript output files
            - "sdk/typescript/src/graphql/generated/**"
            - "sdk/typescript/src/graphql/schemas/**"
            - "sdk/typescript/src/client/types/generated.ts"
            - "sdk/typescript/src/client/types/params.ts"
            - "sdk/graphql-transport/src/generated/**"
            # Configuration files that affect codegen
            - "package.json"
            - "pnpm-workspace.yaml"
            - "turbo.json"
            - "sdk/typescript/package.json"
            - "sdk/graphql-transport/package.json"
            - "sdk/typescript/scripts/**"
            - "sdk/graphql-transport/codegen.ts"
            - "sdk/graphql-transport/src/queries/**"
            - "sdk/typescript/genversion.mjs"
            # Turbo hierarchy workflow and related scripts
            - ".github/workflows/turbo_hierarchy.yml"
          isStarfishSynchronization:
            - "crates/starfish/core/src/header_synchronizer.rs"
            - "crates/starfish/core/src/commit_syncer/**"
            - "crates/starfish/core/src/transactions_synchronizer.rs"
            - "crates/starfish/core/src/authority_service.rs"
            - "crates/starfish/core/src/commit.rs"
            - "crates/starfish/core/src/block_header.rs"
            - "crates/starfish/core/src/transaction.rs"
            - "crates/starfish/core/src/shard_reconstructor.rs"
            - "scripts/compatibility/split-cluster-sync-check.sh"
            - ".github/workflows/_split_cluster_sync_check.yml"
            - ".github/workflows/hierarchy.yml"
