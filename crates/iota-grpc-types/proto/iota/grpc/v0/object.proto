syntax = "proto3";

package iota.grpc.v0.object;

import "iota/grpc/v0/bcs.proto";
import "iota/grpc/v0/types.proto";

// An object on the IOTA blockchain.
message Object {
  // Reference to this object.
  optional iota.grpc.v0.types.ObjectReference reference = 1;
  // This Object serialized as BCS.
  optional iota.grpc.v0.bcs.BcsData bcs = 2;
}

// A list of objects.
message Objects {
  repeated Object objects = 1;
}
