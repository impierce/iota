# Filter on owner
{
  objects(filter: {
    owner: "0x7d49a79ca16e3986b2221ee7bf93d9a34e2192517c7efea995b34f69615ee053"
  }) {
    edges {
      node {
        storageRebate
        owner {
          __typename
          ... on Shared {
            initialSharedVersion
          }
          __typename
          ... on Parent {
            parent {
              address
            }
          }
          __typename
          ... on AddressOwner {
            owner {
              address
            }
          }
        }
      }
    }
  }
}
