# Get all on-chain objects of type `StakedIota` from the staking pool module
# and return their type representation.
{
  objects(filter: {type: "0x3::staking_pool::StakedIota"}) {
    edges {
      node {
        asMoveObject {
          contents {
            type {
              repr
            }
          }
        }
      }
    }
  }
}
