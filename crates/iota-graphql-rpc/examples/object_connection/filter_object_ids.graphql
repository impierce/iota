# Filter on objectIds
{
  objects(filter: { objectIds: [
    "0x281b97c4303f1571f64499b214c35d933ea5ad21522a608daffd2a5b2bd318d8"
  ]}) {
    edges {
      node {
        storageRebate
        owner {
          __typename
          ... on Shared {
            initialSharedVersion
          }
          __typename
          ... on Parent {
            parent {
              address
            }
          }
          __typename
          ... on AddressOwner {
            owner {
              address
            }
          }
        }
      }
    }
  }
}
