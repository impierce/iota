# Get the checkpoint's information at a particular digest
{
  checkpoint(id: { digest: "C7gxntU7eUyfTUPNgiuN4rwSdw2ddHojrtL14MezE1ou" }) {
    digest
    sequenceNumber
    validatorSignatures
    previousCheckpointDigest
    networkTotalTransactions
    rollingGasSummary {
      computationCost
      storageCost
      storageRebate
      nonRefundableStorageFee
    }
    epoch {
      epochId
      referenceGasPrice
      startTimestamp
      endTimestamp
    }
  }
}
