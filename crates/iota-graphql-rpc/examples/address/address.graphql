# Get the address' balance and its coins' id and type
{
  address(
    address: "0x479c602460ae68771dcb9bfcef607dccc678859fb72d7d8aa8d9ce58c9430747"
  ) {
    address
    balance {
      coinType {
        repr
      }
      coinObjectCount
      totalBalance
    }
    coins {
      nodes {
        contents {
          type {
            repr
          }
        }
      }
    }
  }
}
