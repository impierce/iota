# Retrieves all StakingRequestEvent events, showing the sender address, timestamp, event type, and additional metadata including the emitting module and raw data.
{
  events(
    filter: {
      eventType: "0x3::validator::StakingRequestEvent"
    }
  ) {
    nodes {
      sendingModule {
        name
        package { digest }
      }
      type {
        repr
      }
      sender {
        address
      }
      timestamp
      json
      bcs
    }
  }
}
