        NEWTYPE:
          TUPLEARRAY:
            CONTENT: U8
            SIZE: 64
    1:
      Secp256k1:
        NEWTYPE:
          TUPLEARRAY:
            CONTENT: U8
            SIZE: 64
    2:
      Secp256r1:
        NEWTYPE:
          TUPLEARRAY:
            CONTENT: U8
            SIZE: 64
