    0:
      MoveCall:
        NEWTYPE:
          TYPENAME: ProgrammableMoveCall
    1:
      TransferObjects:
        TUPLE:
          - SEQ:
              TYPENAME: Argument
          - TYPENAME: Argument
    2:
      SplitCoins:
        TUPLE:
          - TYPENAME: Argument
          - SEQ:
              TYPENAME: Argument
    3:
      MergeCoins:
        TUPLE:
          - TYPENAME: Argument
          - SEQ:
              TYPENAME: Argument
    4:
      Publish:
        TUPLE:
          - SEQ:
              SEQ: U8
          - SEQ:
              TYPENAME: ObjectId
    5:
      MakeMoveVec:
        TUPLE:
          - OPTION:
              TYPENAME: TypeInput
          - SEQ:
              TYPENAME: Argument
    6:
      Upgrade:
        TUPLE:
          - SEQ:
              SEQ: U8
          - SEQ:
              TYPENAME: ObjectId
          - TYPENAME: ObjectId
          - TYPENAME: Argument
