      SecondaryIndexOutOfBounds:
        STRUCT:
          - result_idx: U16
          - secondary_idx: U16
    6:
      InvalidResultArity:
        STRUCT:
          - result_idx: U16
    7:
      InvalidGasCoinUsage: UNIT
    8:
      InvalidValueUsage: UNIT
    9:
      InvalidObjectByValue: UNIT
    10:
      InvalidObjectByMutRef: UNIT
    11:
      SharedObjectOperationNotAllowed: UNIT
    12:
      InvalidArgumentArity: UNIT
CompressedSignature:
