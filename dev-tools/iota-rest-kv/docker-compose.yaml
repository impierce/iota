services:
  kv-store-rest-api:
    image: iotaledger/iota-rest-kv
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/iota/credentials.json
    volumes:
      - ./config/bigtable.yaml:/iota/config.yaml:r
      # make sure to create the credentials.json file before running this container
      - ./config/credentials.json:/iota/credentials.json:r
    # The exposed port should match the one declared in the config.yaml
    ports:
      - "3555:3555"
    command: >
      iota-rest-kv
      --config /iota/config.yaml
