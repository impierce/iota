      - ./configs/genesis/genesis.blob:/opt/iota/config/genesis.blob:ro
      - ./data/validator-11:/opt/iota/db:rw

  validator-12:
    <<: *common-validator
    container_name: validator-12
    hostname: validator-12
    networks:
      iota-network:
        ipv4_address: 10.0.0.22
    volumes:
