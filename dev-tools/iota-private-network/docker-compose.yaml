      - ./configs/genesis/genesis.blob:/opt/iota/config/genesis.blob:ro
      - ./data/validator-5:/opt/iota/db:rw

  validator-6:
    <<: *common-validator
    container_name: validator-6
    hostname: validator-6
    networks:
      iota-network:
        ipv4_address: 10.0.0.16
    volumes:
      - ./configs/validators/validator-6-8080.yaml:/opt/iota/config/validator.yaml:ro
      - ./configs/genesis/genesis.blob:/opt/iota/config/genesis.blob:ro
      - ./data/validator-6:/opt/iota/db:rw

  validator-7:
    <<: *common-validator
    container_name: validator-7
    hostname: validator-7
    networks:
      iota-network:
        ipv4_address: 10.0.0.17
    volumes:
      - ./configs/validators/validator-7-8080.yaml:/opt/iota/config/validator.yaml:ro
      - ./configs/genesis/genesis.blob:/opt/iota/config/genesis.blob:ro
