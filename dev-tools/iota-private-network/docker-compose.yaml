  validator-10:
    <<: *common-validator
    container_name: validator-10
    hostname: validator-10
    networks:
      iota-network:
        ipv4_address: 10.0.0.20
    volumes:
      - ./configs/validators/validator-10-8080.yaml:/opt/iota/config/validator.yaml:ro
      - ./configs/genesis/genesis.blob:/opt/iota/config/genesis.blob:ro
      - ./data/validator-10:/opt/iota/db:rw

  validator-11:
    <<: *common-validator
    container_name: validator-11
    hostname: validator-11
