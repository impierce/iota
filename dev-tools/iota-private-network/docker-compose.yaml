      - ./configs/genesis/genesis.blob:/opt/iota/config/genesis.blob:ro
      - ./data/validator-12:/opt/iota/db:rw

  validator-13:
    <<: *common-validator
    container_name: validator-13
    hostname: validator-13
    networks:
      iota-network:
        ipv4_address: 10.0.0.23
    volumes:
      - ./configs/validators/validator-13-8080.yaml:/opt/iota/config/validator.yaml:ro
      - ./configs/genesis/genesis.blob:/opt/iota/config/genesis.blob:ro
      - ./data/validator-13:/opt/iota/db:rw

  validator-14:
    <<: *common-validator
    container_name: validator-14
    hostname: validator-14
    networks:
      iota-network:
        ipv4_address: 10.0.0.24
    volumes:
      - ./configs/validators/validator-14-8080.yaml:/opt/iota/config/validator.yaml:ro
      - ./configs/genesis/genesis.blob:/opt/iota/config/genesis.blob:ro
      - ./data/validator-14:/opt/iota/db:rw

  validator-15:
    <<: *common-validator
    container_name: validator-15
    hostname: validator-15
    networks:
      iota-network:
        ipv4_address: 10.0.0.25
    volumes:
      - ./configs/validators/validator-15-8080.yaml:/opt/iota/config/validator.yaml:ro
      - ./configs/genesis/genesis.blob:/opt/iota/config/genesis.blob:ro
      - ./data/validator-15:/opt/iota/db:rw

  validator-16:
    <<: *common-validator
    container_name: validator-16
    hostname: validator-16
    networks:
